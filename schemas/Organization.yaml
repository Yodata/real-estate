# @format

type: object
example:
  type: string
  address:
    type: PostalAddress
    streetAddress: 1007 Mountain Gate Rd
    postOfficeBoxNumber: Box 1234
    addressRegion: NJ
    addressLocality: Gotham City
    postalCode: '10010'
    addressCountry: CA
    addressCounty: string
    addressSubdivision: Gotham Heights
  availableLanguage:
    - type: Language
      name: English
      additionalName: en-us
  branchCode: for BHHS profile events, see additionalProperty.OfficeId
  certification:
    - type: Certification
      name: e-Agent Certified
      issuedBy:
        type: RealEstateOrganization
        id: https://example.com/profile/card#me
        name: Gotham City Real Estate
      issuedTo:
        type: RealEstateAgent
        id: http://example.com
        name: string
  contactPoint:
    - type: ContactPoint
      name: Work
      telephone: '555-555-5555'
      faxNumber: '555-555-5555'
      email: bob@example.com
      url: https://www.facebook.com/hallandoates
  email: user@example.com
  faxNumber: string
  image:
    - type: ImageObject
      '@id': http://example.com
      id: http://user.example.com/public/logo/image.jpg
      name: image.jpg
      encodingFormat: image/jpeg
      about: http://user.example.com/profile/card#me
      url: http://user.example.com/public/profile/image.jpg
  logo:
    - type: DigitalDocument
      id: http://user.example.com/public/logo/archive.zip
      name: archive.zip
      encodingFormat: application/zip
      about:
        type: RealEstateTransaction
        identifier:
          bmsTransactionId: xxxx
      url: https://example.com
  name: string
  parentOrganization:
    - http://example.com
  subOrganization:
    - http://example.com
  telephone: '+15558675309'
  url: http://example.com
properties:
  type: { type: string }
  address:
    $ref: PostalAddress.yaml
  availableLanguage:
    $ref: availableLanguage.yaml
  branchCode:
    description: 'A short textual code that uniquely identifies a place of business.'
    example: for BHHS profile events, see additionalProperty.OfficeId
    type: string
  certification:
    $ref: certification-prop.yaml
  contactPoint:
    $ref: contact-point.yaml
  email:
    $ref: email.yaml
  faxNumber:
    $ref: faxNumber.yaml
  image:
    $ref: image.yaml
  logo:
    $ref: logo.yaml
  name:
    $ref: name.yaml
  parentOrganization:
    $ref: parentOrganization.yaml
  subOrganization:
    $ref: subOrganization.yaml
  telephone:
    $ref: telephone.yaml
  url:
    $ref: url.yaml
