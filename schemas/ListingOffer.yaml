# @format

$id: http://realestate.yodata.me/schemas/ListingOffer.yaml
type: object
title: Listing Offer
description: an offer is made to buy a PropertyListing
name: ListingOffer
required:
  - type
  - agent
  - object
  - recipient
  - offerPrice
example:
  type: ListingOffer
  agent:
    type: Contact
    name: Bruce Wayne
    givenName: Bruce
    familyName: Wayne
    email: batman@example.com
    telephone: 1+888-867-5309
    identifier:
      hsfconsumerid: xxxxxxxxxxxxx
    sameAs:
      amcecrmid: '1234567'
      salesForceId: xxxxxxxxxxxxx
  offerPrice:
    type: PriceSpecification
    minPrice: 75000
    maxPrice: 100000
    price: 75000
    priceCurrency: USD
  propertyListing:
    type: PropertyListing
    originatingSystemName: GOTHAM-MLS
    originatingSystemKey: '12345'
    url: https://{company-website-url}/{path-to-listing}
    streetAddress: 1007 Mountain Gate Rd
    addressRegion: New Jersey
    addressLocality: Gotham City
    postalCode: '10010'
    addressCountry: USA
    listingPrice:
      type: PriceSpecification
      price: 7500000
      priceCurrency: USD
  recipient:
    type: RealEstateAgent
    name: Randy RealEstateAgent
    id: https://{agentid}.example.com/profile/card#me
properties:
  type: { const: ListingOffer }
  agent: { $ref: website.visitor.yaml }
  offerPrice:
    $ref: PriceSpecification.yaml
    description: the offer price or range
  propertyListing:
    type: object
    description: the listing on which the offer is made.
    example:
      $ref: example-propertylisting.yaml
  recipient:
    description: listing agent or offer recipient
    oneOf:
      - $ref: RealEstateAgent.yaml
      - $ref: Person.yaml
    example:
      type: RealEstateAgent
      name: Randy RealEstateAgent
      id: https://{agentid}.example.com/profile/card#me
