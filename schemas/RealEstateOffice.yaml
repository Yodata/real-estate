type: object
description: A real estate office / place of business.
example:
  type: RealEstateOffice
  address:
    type: PostalAddress
    streetAddress: 1007 Mountain Gate Rd
    postOfficeBoxNumber: Box 1234
    addressRegion: NJ
    addressLocality: Gotham City
    postalCode: '10010'
    addressCountry: CA
    addressCounty: string
    addressSubdivision: Gotham Heights
  availableLanguage:
    - type: Language
      name: English
      additionalName: en-us
  branchCode: for BHHS profile events, see additionalProperty.OfficeId
  certification:
    - type: Certification
      name: e-Agent Certified
      issuedBy:
        type: RealEstateOrganization
        id: https://example.com/profile/card#me
        name: Gotham City Real Estate
      issuedTo:
        type: RealEstateAgent
        id: http://example.com
        name: string
  contactPoint:
    - type: ContactPoint
      name: Relocation
      telephone: 1-245-880-8222
      faxNumber: 958-530-3473
      email: relocation@example.com
      url: https://www.facebook.com/hallandoates
  email: user@example.com
  faxNumber: string
  image:
    - type: ImageObject
      '@id': http://example.com
      id: http://user.example.com/public/logo/image.jpg
      name: image.jpg
      encodingFormat: image/jpeg
      about: http://user.example.com/profile/card#me
      url: http://user.example.com/public/profile/image.jpg
  logo:
    - type: DigitalDocument
      id: http://user.example.com/public/logo/archive.zip
      name: archive.zip
      encodingFormat: application/zip
      about:
        type: RealEstateTransaction
        identifier:
          bmsTransactionId: xxxx
      url: https://example.com
  name: string
  parentOrganization: null
  subOrganization:
    - http://example.com
  telephone: '+15558675309'
  url: http://example.com
  areaServed:
    type: PostalCode
    postalCode: '91371'
    addressLocality: Woodland Hills
    addressCounty: Los Angeles
    addressRegion: CA
    addressCountry: US
  description: The number on Gotham City Real Estate Company since 1940
  numberOfSubOrganizations: 0
  member:
    - type: OrganizationRole
      roleName: Owner
      memberOf:
        type: RealEstateOrganization
        id: http://orgid.example.com/profile/card#me
      member: https://memberid.example.com/profile/card#me
      startDate: '2019-08-24T14:15:22Z'
      endDate: '2019-08-24T14:15:22Z'
  memberOf:
    - type: OrganizationRole
      roleName: Owner
      memberOf:
        type: RealEstateOrganization
        id: http://orgid.example.com/profile/card#me
      member: https://memberid.example.com/profile/card#me
      startDate: '2019-08-24T14:15:22Z'
      endDate: '2019-08-24T14:15:22Z'
  permit:
    - type: RealEstateLicense
      name: CA-DRE# 02068375
      identifier:
        type: PropertyValue
        name: CA-DRE
        value: '02068375'
      issuedBy:
        type: State
        name: California
      issuedThrough:
        type: Service
        name: California Department of Real Estate
      validIn:
        type: State
        name: California
      validFrom: '2019-07-07T10:55:02Z'
      validUntil: '2019-07-07T10:55:02Z'
  geoCoordinates:
    type: GeoCoordinates
    longitude: 73.98
    latitude: 40.75
allOf:
  - $ref: RealEstateOrganization.yaml
  - title: RealEstateOffice
    properties:
      type:
        type: string
        description: RealEstateOffice
        enum:
          - RealEstateOffice

      contactPoint:
        description: department or role specific contact points, i.e. relocation.
        example:
          - type: ContactPoint
            name: Relocation
            telephone: 1-245-880-8222
            faxNumber: 958-530-3473
            email: relocation@example.com

      description:
        example: The number on Gotham City Real Estate Company since 1940

      parentOrganization:
        description: Office broker or franchisor.
        x-range: RealEstateOrganization

      subOrganization:
        type: array
        x-range: RealEstateAgent
        description: Agents and teams associated with the office.
        items:
          type: string
          format: uri

      geoCoordinates:
        description: It is only applied to BHHS office.
        $ref: GeoCoordinates.yaml
