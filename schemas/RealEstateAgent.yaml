  id: { $ref: id.yaml }
  identifier: { $ref: identifier.yaml }
  image: { $ref: image.yaml }
  jobTitle:
    type: array
    items: { $ref: jobTitle.yaml }
  memberOf: { $ref: memberOf.yaml }
  name: { $ref: name.yaml }
  parentOrganization: { $ref: parentOrganization.yaml }
