                  - Regional Mall
                  - Retail Pad
                  - Vehicle Related
                  - Outlet Center
                  - Power Center
                  - Neighborhood Center
                  - Community Center
                  - Specialty Center
                  - Theme/Festival Center
                  - Restaurant
                  - Post Office
                  - Retail Condo
                  - Lifestyle Center
                  - Manufacturing
                  - Warehouse
                  - Distribution
                  - Flex Space
                  - Research & Development
                  - Refrigerated/Cold Storage
                  - Office Showroom
                  - Truck Terminal/Hub/Transit
                  - Self Storage
                  - Industrial Condo
                  - Data Center
                  - Retail-Pad
                  - Residential
                  - Other
                  - High-Rise
                  - Mid-Rise
                  - Low-Rise/Garden
                  - Government Subsidized
                  - Mobile Home Park
                  - Senior Living
                  - Skilled Nursing
                  - Single Family Rental Portfolio
                  - School
