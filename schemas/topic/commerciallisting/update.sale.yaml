                  - Golf Course
                  - Church
                  - Full Service
                  - Limited Service
                  - Select Service
                  - Resort
                  - Economy
                  - Extended Stay
                  - Casino
            stories:
              type: number
              description: the number of floors in the property
            streetAddress:
              type: string
              description: the street address
            url:
              type: string
              format: uri
              description: URL of the item.
            yearBuilt:
              type: number
              description: the year the structure was built
            class:
              type: string
              description: property class
            highlights:
              type: array
              description: highlights
              items:
                type: string
            documents:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: number
                    description: document id
                  url:
                    type: string
                    format: uri
                    description: document url
                  name:
                    type: string
                    description: document name
                  original_file_name:
                    type: string
