title: MarketingProgram
description: A collection of pre-defined activities which take place over a period of time or in a regular, ongoing schedule.
type: object
example:
  type: MarketingProgram
  name: Market Activity Report for 508 Homeward Avenue
  identifier:
    bhhsconsumerid: '12345'
  member:
    - type: ProgramMembership
      role: member
      member:
        type: Contact
        name: string
        identifier:
          bhhsconsumerid: '12345'
      memberOf:
        type: MarketingProgram
        name: Market Activity Report 508 Homewood Ave
        identifier:
          bhhsconsumerid: '12345'
  creator: http://example.com
  dateCreated: '2019-08-24T14:15:22Z'
  dateModified: '2019-08-24T14:15:22Z'
  about:
    type: Place
    address:
      type: PostalAddress
      name: Home
      addressCountry: USA
      addressCounty: Gotham County
      addressLocality: Gotham City
      addressRegion: New Jersey
      addressSubdivision: Gotham Heights
      postalCode: '10010'
      postOfficeBoxNumber: Box 1234
      streetAddress: 1007 Mountain Gate Rd
    geo:
      type: GeoShape
      geoMidpoint:
        type: GeoCoordinates,
        longitude: '73.98'
        latitude: '40.75'
      geoRadius:
        type: QuantitativeValue,
        value: '10,'
        unitCode: mi,
        unitText: miles
      box: '(33.5697,-117.775),(33.6018,-117.707)'
properties:
  type: { const: MarketingProgram }
  name: { $ref: name.yaml, example: 'Market Activity Report for 508 Homeward Avenue' }
  identifier: { $ref: identifier.yaml }
  member:
    type: array
    x-range: [ ProgramMembership ]
    items: { $ref: ProgramMembership.yaml }
  creator:
    description: creator / author of the item
    type: string
    format: uri
  dateCreated:
    $ref: dateCreated.yaml
  dateModified:
    $ref: dateModified.yaml
  about:
    $ref: Place.yaml