# @format

title: Task
type: object
description: an action assigned to an agent, typically as part of a set of interdependent tasks in a Plan
x-range: Task
example:
  type: Task
  identifier:
    redEvent_ID: '23445'
  actionStatus: PotentialActionStatus
  memberOf:
    type: Plan
    identifier:
      redPlan_ID: xxxx
  agent:
    type: RealEstateAgent
    id: http://user.example.com/profile/card#me
  participant:
    - type: Contact
      name: Bruce Wayne
      email: bruce@example.com
      identifier:
        redContact_GUID: 92d0a096-457e-4643-ace8-fa95b6bdb1c5
  name: Call Ricky
  description: Agenda 1. Something 2. Something Else ...
  keywords:
    - string
  dateDue: '2019-08-24T14:15:22Z'
  dateCompleted: '2019-08-24T14:15:22Z'
  location:
    type: Place
    address:
      streetAddress: 1007 Mountain Gate Rd
      addressLocality: Gotham City
      addressRegion: NJ
      postalCode: '10007'
      addressCounty: Gotham addressCounty
      addressSubdivision: Gotham Heights
properties:
  type:
    $ref: type.yaml
    enum:
      - Task
  identifier:
    $ref: identifier.yaml
    example:
      redEvent_ID: '23445'
  actionStatus:
    $ref: actionStatus.yaml
    example: PotentialActionStatus
  memberOf:
    type: object
    x-range: Plan
    description: a plan the task is associated with
    example:
      type: Plan
      identifier:
        redPlan_ID: xxxx
  agent:
    type: object
    description: the party who completed, or will complete the task
    x-range:
      - Person
      - Organization
      - RealEstateAgent
      - Contact
    example:
      type: RealEstateAgent
      id: http://user.example.com/profile/card#me

  participant:
    $ref: participant.yaml

  name:
    type: string
    description: name or title
    example: Call Ricky

  description:
    type: string
    description: task detailed description
    example: Agenda 1. Something 2. Something Else ...

  keywords:
    type: array
    items:
      type: string

  dateDue:
    $ref: dueDate.yaml

  dateCompleted:
    type: string
    format: date-time
    description: date the task was completed

  location:
    $ref: location.yaml
