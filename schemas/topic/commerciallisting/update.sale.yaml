payload:
  type: object
  properties:
    topic:
      type: string
      const: realestate/commerciallisting#update.sale
    data:
      type: object
      properties:
        type:
          type: string
          const: UpdateAction
        object:
          type: object
          description: a real estate property listed for sale
          properties:
            type:
              type: string
              enum: [SaleListing]
            addressCountry:
              type: string
              enum:
                - Other
                - United States
                - Bahamas
                - Canada
                - Mexico
                - Turkey
                - Australia
                - Switzerland
                - France
                - Monaco
                - Spain
                - Germany
                - Italy
                - UnitedKingdom
                - Poland
                - Romania
                - Netherlands
                - Hungary
            addressLocality:
              type: string
              description: City, Township.
            addressRegion:
              type: string
              description: abbreviated state or province
            hasElevators:
              type: string
            buyerAgent:
              type: object
              description: the buyer's RealEstateAgent
            buyerOffice:
              type: object
              description: the buyer's RealEstateOffice
            closeDate:
              type: string
              format: date-time
              description: listing close date
            image:
              type: array
              description: an ImageObject or URI reference to an image on the web.
              items:
                type: object
                properties:
                  type:
                    type: string
                    const: Property Photo
                  encodingFormat:
                    type: string
                    const: Image/jpg
                  id:
                    type: string
                    format: uri
                    description: image url
            internetAddressDisplayYN:
              type: string
              enum: ['Y', 'N']
            latitude:
              type: number
              description: The latitude of a location.
            longitude:
              type: number
              description: The longitude of a location.
            listingAgent:
              type: object
              properties:
                type:
                  type: string
                  const: RealEstateAgent
                name:
                  type: string
                  description: listings agent name
                email:
                  type: string
                  description: listings agent email
                telephone:
                  type: string
                  description: listings agent telephone
                identifier:
                  type: object
                  description: listings agent identifier
                additionalProperty:
                  type: object
                  properties:
                    agentId:
                      type: string
                      description: listings agent id
            coListingAgent:
              type: array
              description: list of coListing Agents
            listingContractDate:
              type: string
              format: date-time
              description: The effective date of the agreement between the seller and the seller's broker.
            listingId:
              type: string
              description: the local identifier for the listing
            listingOffice:
              type: object
              properties:
                type:
                  type: string
                  const: RealEstateAgent
                name:
                  type: string
                  description: listings office name
                email:
                  type: string
                  description: listings office email
                telephone:
                  type: string
                  description: listings office telephone
                identifier:
                  type: object
                  description: listings office identifier
                additionalProperty:
                  type: object
                  properties:
                    officeId:
                      type: string
                      description: listings office Id
            listingOriginatingSystem:
              type: object
              properties:
                type:
                  type: string
                  description: OriginatingSystem type
                name:
                  type: string
                  description: OriginatingSystem name
                identifier:
                  type: object
                  properties:
                    orgId:
                      type: string
                      description: OriginatingSystem identifier orgId
            listingPrice:
              type: object
              properties:
                type:
                  type: string
                  const: PriceSpecification
                priceCurrency:
                  type: string
                  const: USD
                value:
                  type: number
                  description: listing price value
            soldPrice:
              type: object
              properties:
                type:
                  type: string
                  const: PriceSpecification
                priceCurrency:
                  type: string
                  const: USD
                value:
                  type: number
                  description: sold price value
            listingStatus:
              type: string
              enum: [Active, Closed]
            livingArea:
              type: object
              properties:
                type:
                  type: string
                  const: QuantitativeValue
                value:
                  type: number
                  description: livingArea value
                unitCode:
                  type: string
                  const: FTK
                unitText:
                  type: string
                  const: SquareFeet
            lotSize:
              type: object
              properties:
                type:
                  type: string
                  const: QuantitativeValue
                value:
                  type: number
                  description: lotSize value
                unitCode:
                  type: string
                  const: ACR
                unitText:
                  type: string
                  const: Acre
            modificationTimestamp:
              type: string
              format: date-time
              description: last modified date of listing
            name:
              type: string
              description: name
            numberOfBathrooms:
              type: string
              description: total number of bathrooms
            originatingSystemKey:
              type: string
              description: the listing identifier from the original MLS
            originatingSystemName:
              type: string
              const: buildout
            postalCode:
              type: string
              maxLength: 12
              description: Zip/Post Code
            propertyType:
              type: string
              enum:
                - Office
                - Retail
                - Industrial
                - Land
                - Multifamily
                - Special Purpose
                - Hospitality
            propertySubType:
              type: array
              items:
                type: string
