# @format

title: Plan
type: object
description: a collection of related tasks
required:
  - type
  - identifier
  - name
x-range: Plan
example:
  type: Plan
  identifier:
    bhhsconsumerid: '12345'
  name: my awesome plan
  description: this is the description of my awesome plan
  member:
    - type: Task
      identifier:
        redEvent_ID: '23445'
      actionStatus: PotentialActionStatus
      memberOf:
        type: Plan
        identifier:
          redPlan_ID: xxxx
      agent:
        type: RealEstateAgent
        id: http://user.example.com/profile/card#me
      participant:
        - type: Contact
          name: Bruce Wayne
          email: bruce@example.com
          identifier:
            redContact_GUID: 92d0a096-457e-4643-ace8-fa95b6bdb1c5
      name: Call Ricky
      description: Agenda 1. Something 2. Something Else ...
      keywords:
        - string
      dateDue: '2019-08-24T14:15:22Z'
      dateCompleted: '2019-08-24T14:15:22Z'
      location:
        type: Place
        address:
          streetAddress: 1007 Mountain Gate Rd
          addressLocality: Gotham City
          addressRegion: NJ
          postalCode: '10007'
          addressCounty: Gotham addressCounty
          addressSubdivision: Gotham Heights
  creator: http://agent.example.com/profile/card#me
  dateCreated: '2019-08-24T14:15:22Z'
  dateModified: '2019-08-24T14:15:22Z'
  dateCompleted: '2019-08-24T14:15:22Z'
properties:
  type: { const: Plan }
  identifier:
    $ref: identifier.yaml
  name:
    type: string
    description: name of the plan
    examples:
      - my awesome plan
      - annoying but effective plan
      - plan to take over the world
      - birthdays and anniversaries plan
  description:
    type: string
    description: description of the item
    example: this is the description of my awesome plan
  member:
    type: array
    description: tasks which make up the plan
    items:
      $ref: Task.yaml
  creator:
    $ref: creator.yaml
  dateCreated:
    $ref: dateCreated.yaml
  dateModified:
    $ref: dateModified.yaml
  dateCompleted:
    $ref: dateCompleted.yaml
