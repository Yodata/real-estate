# @format

example:
  type: Contact
  affiliation:
    - https://example.com/profile/card#me
  address:
    - type: PostalAddress
      streetAddress: 1007 Mountain Gate Rd
      postOfficeBoxNumber: Box 1234
      addressRegion: NJ
      addressLocality: Gotham City
      postalCode: '10010'
      addressCountry: CA
      addressCounty: string
      addressSubdivision: Gotham Heights
  birthDate: '2019-08-24'
  contactPoint:
    - type: ContactPoint
      name: Work
      telephone: '555-555-5555'
      faxNumber: '555-555-5555'
      email: bob@example.com
      url: https://www.facebook.com/hallandoates
  email: user@example.com
  additionalName: Johnny,John
  familyName: Smith
  faxNumber: string
  givenName: John
  honorificPrefix: Dr
  honorificSuffix: Esq
  jobTitle: CEO
  knowsLanguage:
    - type: Language
      name: English
      additionalName: en-us
  name: string
  telephone: '+15558675309'
  worksFor: string
  identifier:
    bhhsconsumerid: '12345'
  additionalProperty:
    supercrmuserid: 1234
    doNotSell: true
  comment:
    - type: Comment
      text: this is my comment.
      author:
        type: Contact
        name: Bruce Wayne
      about:
        type: PropertyListing
        id: https://example.com/listingid
      dateCreated: '2019-07-15T05:24:05Z'
      dateModified: '2019-07-15T05:24:05Z'
  contactGroup:
    - type: ContactGroup
      identifier:
        bhhsconsumerid: '12345'
      name: Past Clients
  keywords:
    - string
  leadOwner:
    type: RealEstateOrganization
    name: Gotham City Real Estate
    id: https://example.com/profile.card#me
  leadSource:
    id: https://www.zillow.com/homedetails/1044-Siler-Pl-Berkeley-CA-94705/24820985_zpid/
    type: RealEstateWebsite
    name: Zillow
    url: https://zillow.com
  originatingSystem:
    type: SoftwareApplication
    name: RDesk
    description: User Created.
    url: http://www.rdeskwebsite.com/
  dateCreated: '2019-08-24T14:15:22Z'
  dateModified: '2019-08-24T14:15:22Z'

allOf:
  - $ref: Person.yaml
  - title: Contact
    description: a CRM contact.
    properties:
      type: { type: string, const: Contact }
      identifier: { $ref: identifier.yaml }
      additionalProperty: { $ref: additionalProperty.yaml }
      comment: { $ref: comment-property.yaml }
      jobTitle: { $ref: jobTitle.yaml }
      contactGroup:
        type: array
        items: { $ref: ContactGroup.yaml }
      keywords:
        type: array
        items: { type: string }

      leadOwner:
        type: object
        description: lead owner
        x-range:
          - RealEstateAgent
          - RealEstateOrganization
          - RealEstateTeam
        example:
          type: RealEstateOrganization
          name: Gotham City Real Estate
          id: https://example.com/profile.card#me

      leadSource:
        type: object
        description: origin of the lead
        x-range:
          - MobileApplication
          - RealEstateOffice
          - RealEstateWebsite
          - Thing
        example:
          id: https://www.zillow.com/homedetails/1044-Siler-Pl-Berkeley-CA-94705/24820985_zpid/
          type: RealEstateWebsite
          name: Zillow
          url: https://zillow.com

      originatingSystem:
        type: object
        x-range:
          - Thing
        description: the original system where this item was created.  Can be of type Thing or any sub-type.
        examples:
          - type: SoftwareApplication
            name: RDesk
            description: User Created.
            url: http://www.rdeskwebsite.com/

      dateCreated: { $ref: dateCreated.yaml }
      dateModified: { $ref: dateModified.yaml }
