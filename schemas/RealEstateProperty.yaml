title: RealEstateProperty
x-range: RealEstateProperty
description: a property in the real estate transaction context
type: object
required:
  - type
  - propertyType
example:
  type: RealEstateProperty
  propertyType: RESI
  addressCountry: CA
  addressLocality: Gotham City
  addressRegion: NJ
  apn: ABC-12345-XX-XXXX
  image:
    - type: ImageObject
      '@id': http://example.com
      id: http://user.example.com/public/logo/image.jpg
      name: image.jpg
      encodingFormat: image/jpeg
      about: http://user.example.com/profile/card#me
      url: http://user.example.com/public/profile/image.jpg
  latitude: 40.75
  listingId: string
  livingArea:
    type: QuantitativeValue
    unitCode: SqFt
    unitText: Square Feet
    value: 1500
  longitude: 73.98
  lotSize:
    type: QuantitativeValue
    unitCode: AC
    unitText: Acres
    value: 0.5
  numberOfBathrooms: '2'
  numberOfBedrooms: '3'
  numberOfRooms: 7
  postalCode: '10010'
  propertySubType: ApartmentPropertyType
  stories: 2
  streetAddress: 1007 Mountain Gate Rd
  yearBuilt: 1988
properties:
  type:
    description: '"RealEstateProperty"'
    enum:
      - RealEstateProperty
    type: string
  propertyType:
    $ref: property-type.yaml
  addressCountry:
    $ref: addressCountry.yaml
  addressLocality:
    $ref: addressLocality.yaml
  addressRegion:
    $ref: addressRegion.yaml
  apn:
    $ref: apn.yaml
  image:
    $ref: image.yaml
  latitude:
    $ref: latitude.yaml
  listingId:
    description: 'the local identifier for the listing (MLS #)'
    type: string
  livingArea:
    description: property indoor space
    example:
      type: QuantitativeValue
      unitCode: SqFt
      unitText: Square Feet
      value: 1500
    type: object
    x-range: QuantitativeValue
  longitude:
    $ref: longitude.yaml
  lotSize:
    description: 'outdoor space minValue, maxValue'
    example:
      type: QuantitativeValue
      unitCode: AC
      unitText: Acres
      value: 0.5
    type: object
    x-range: QuantitativeValue
  numberOfBathrooms:
    description: the number of bathrooms
    example: '2'
    type: string
  numberOfBedrooms:
    description: the number of bedrooms
    example: '3'
    type: string
  numberOfRooms:
    description: the total number of rooms in the building
    type: string
    example: 7
  postalCode:
    $ref: postalCode.yaml
  propertySubType:
    $ref: property-sub-type.yaml
  stories:
    $ref: stories.yaml
  streetAddress:
    $ref: streetAddress.yaml
  yearBuilt:
    $ref: yearBuilt.yaml
